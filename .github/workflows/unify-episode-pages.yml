name: Unify Episode Pages

on:
  push:
    paths:
      - scripts/unify_episode_pages.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/unify_episode_pages.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add episode-2.html episode-3.html episode-4.html episode-5.html
          git diff --cached --quiet || git commit -m "Unify Episode II to V page formatting"
          git push
