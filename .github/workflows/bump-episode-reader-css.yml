name: Refresh Episode Reader CSS

on:
  push:
    paths:
      - scripts/bump_episode_reader_css.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/bump_episode_reader_css.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add episode-2.html episode-3.html episode-4.html episode-5.html
          git diff --cached --quiet || git commit -m "Force refresh of unified episode reader styles"
          git push
