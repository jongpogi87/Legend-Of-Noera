name: Publish Episode Refinements

on:
  push:
    paths:
      - scripts/refine_episodes.py
      - .github/workflows/add-episode-navigation.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply episode refinements
        run: python scripts/refine_episodes.py

      - name: Commit refined pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add episode-1.html episode-2.html episode-3.html episode-4.html episode-5.html chronicles-refined.css
          if ! git diff --cached --quiet; then
            git commit -m "Publish episode journey and status refinements"
            git push
          fi
