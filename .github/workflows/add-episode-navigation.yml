name: Refine Episode Experience

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/add-episode-navigation.yml'

permissions:
  contents: write

jobs:
  refine-episodes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply episode refinements
        run: |
          python <<'PY'
          from pathlib import Path

          config = {
              1: {"prev": None, "next": (2, "The Sanctuary")},
              2: {
                  "prev": (1, "The Girl Who Saw Differently"),
                  "next": (3, "Two Lives"),
                  "status": "Coming Soon",
                  "notice": '<span class="chapter-status-label">Chapter Status</span><strong>Coming Soon</strong><p>The story has already been written. Its illustrated comic adaptation is next in the Chronicles.</p>',
              },
              3: {
                  "prev": (2, "The Sanctuary"),
                  "next": (4, "The Calling"),
                  "status": "In Development",
                  "notice": '<span class="chapter-status-label">Chapter Status</span><strong>In Development</strong><p>The storyboards and visual direction for this chapter are currently taking shape.</p>',
              },
              4: {
                  "prev": (3, "Two Lives"),
                  "next": (5, "The First Step"),
                  "status": "In Production",
                  "notice": '<span class="chapter-status-label">Chapter Status</span><strong>In Production</strong><p>This chapter is moving through production as its scenes and panels are carefully prepared.</p>',
              },
              5: {
                  "prev": (4, "The Calling"),
                  "next": None,
                  "status": "Season Finale",
                  "notice": '<span class="chapter-status-label">Chapter Status</span><strong>Season Finale</strong><p>The closing movement of Season I is being carefully developed for its illustrated release.</p>',
              },
          }

          begin_ids = {
              1: "begin-reading",
              2: "episode-two-begin",
              3: "episode-three-begin",
              4: "episode-four-begin",
              5: "episode-five-begin",
          }

          def episode_nav(number):
              info = config[number]
              if info["prev"]:
                  pnum, ptitle = info["prev"]
                  previous = f'<a class="episode-switch episode-switch-prev" href="episode-{pnum}.html"><small>Previous Episode</small><strong>← Episode {pnum}</strong><span>{ptitle}</span></a>'
              else:
                  previous = '<a class="episode-switch episode-switch-prev" href="comic.html#season-one"><small>Previous</small><strong>← Season I</strong><span>The Awakening</span></a>'
              if info["next"]:
                  nnum, ntitle = info["next"]
                  following = f'<a class="episode-switch episode-switch-next" href="episode-{nnum}.html"><small>Next Episode</small><strong>Episode {nnum} →</strong><span>{ntitle}</span></a>'
              else:
                  following = '<a class="episode-switch episode-switch-next" href="comic.html#season-one"><small>Season Complete</small><strong>Season I ✓</strong><span>Return to The Awakening</span></a>'
              return (
                  '\n        <nav class="episode-series-navigation" aria-label="Season I episode navigation">\n'
                  f'          {previous}\n'
                  '          <a class="episode-switch episode-switch-season" href="comic.html#season-one"><small>Chronicles</small><strong>Season I</strong><span>The Awakening</span></a>\n'
                  f'          {following}\n'
                  '        </nav>'
              )

          for number, info in config.items():
              path = Path(f"episode-{number}.html")
              text = path.read_text(encoding="utf-8")

              text = text.replace("Choose a Chapter", "Journey Through This Episode")
              text = text.replace("Begin Reading", "Begin the Journey")

              if number > 1:
                  for old in (
                      '<span><strong>Coming</strong> Chapter Art</span>',
                      '<span><strong>In Development</strong> Chapter Art</span>',
                      '<span><strong>In Production</strong> Chapter Art</span>',
                      '<span><strong>Season Finale</strong> Chapter Art</span>',
                  ):
                      text = text.replace(old, f'<span><strong>{info["status"]}</strong> Status</span>')

                  new_notice = f"notice.innerHTML = '{info['notice']}';"
                  text = text.replace(
                      "notice.innerHTML = '<span>❧</span><strong>Chapter artwork is being prepared.</strong><p>This page is ready for its illustrated panels.</p>';",
                      new_notice,
                  )
                  text = text.replace(
                      "notice.innerHTML='<span>❧</span><strong>Chapter artwork is being prepared.</strong><p>This page is ready for its illustrated panels.</p>';",
                      new_notice,
                  )

              if "episode-series-navigation" not in text:
                  marker = f'<button id="{begin_ids[number]}"'
                  pos = text.find(marker)
                  end = text.find('</div>', pos)
                  if pos != -1 and end != -1:
                      end += len('</div>')
                      text = text[:end] + episode_nav(number) + text[end:]

              text = text.replace('<span class="secondary-action is-disabled" aria-disabled="true">Episode III →</span>', '<a class="secondary-action" href="episode-3.html">Episode III →</a>')
              text = text.replace('<span class="secondary-action is-disabled" aria-disabled="true">Episode IV →</span>', '<a class="secondary-action" href="episode-4.html">Episode IV →</a>')
              text = text.replace('<span class="secondary-action is-disabled" aria-disabled="true">Episode V →</span>', '<a class="secondary-action" href="episode-5.html">Episode V →</a>')
              path.write_text(text, encoding="utf-8")

          css = Path("chronicles-refined.css")
          style = css.read_text(encoding="utf-8")
          addition = '''
.episode-series-navigation{position:relative;z-index:8;max-width:820px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:24px 0 0}.episode-switch{min-height:78px;display:flex;flex-direction:column;justify-content:center;padding:12px 15px;border:1px solid rgba(214,184,108,.3);background:rgba(3,12,15,.65);color:#f5f1e6;text-decoration:none}.episode-switch:link,.episode-switch:visited{color:#f5f1e6;text-decoration:none}.episode-switch small{color:#8fa6a2;font:800 8px system-ui,sans-serif;letter-spacing:.16em;text-transform:uppercase}.episode-switch strong{margin:4px 0;color:#efd98f;font:600 14px Georgia,serif}.episode-switch span{color:#b7c8c4;font:12px/1.3 Georgia,serif}.episode-switch-season{text-align:center}.episode-switch-next{text-align:right}.chapter-status-label{display:block!important;margin-bottom:8px;color:#8fa6a2!important;font:800 9px system-ui,sans-serif!important;letter-spacing:.2em;text-transform:uppercase}
@media(max-width:640px){.episode-series-navigation{grid-template-columns:1fr}.episode-switch,.episode-switch-next{text-align:center}}
'''
          if ".chapter-status-label" not in style:
              css.write_text(style + addition, encoding="utf-8")
          PY

      - name: Commit refinements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add episode-1.html episode-2.html episode-3.html episode-4.html episode-5.html chronicles-refined.css
          git diff --cached --quiet || git commit -m "Apply episode journey and production status refinements"
          git push
